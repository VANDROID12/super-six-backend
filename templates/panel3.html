<!DOCTYPE html>
<html>

<head>
    <title>Tactical Cricket Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            user-select: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        h1 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            color: #fff;
        }

        /* --- LAYOUT CONTAINERS --- */
        .main-layout {
            display: flex;
            flex-direction: row;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            align-items: stretch;
            /* Make both columns equal height */
        }

        .left-column {
            flex: 1;
            min-width: 320px;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            background: #2d2d2d;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .right-column {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .interactive-zone {
            position: relative;
            width: 500px;
            height: 500px;
            
            /* NEW: Image Background */
            background-image: url('/static/stadium.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            border: 2px solid #555;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            margin-bottom: 20px;
            cursor: crosshair; /* Changes cursor to a target for aiming */
        }

        /* --- SIX TARGET MARKER (RED) --- */
        #shot-marker {
            position: absolute;
            width: 14px; height: 14px;
            background-color: #ff4444;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: none;
            pointer-events: none;
            z-index: 20;
            box-shadow: 0 0 10px #ff0000;
        }

        /* --- FIELDER MARKER --- */
        .fielder-marker {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #2196F3;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: bold;
            color: white;
            transition: background-color 0.2s, transform 0.1s, left 0.8s ease-out, top 0.8s ease-out;
        }

        .fielder-marker:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }

        .fielder-marker:active {
            cursor: grabbing;
        }

        .fielder-marker.role-locked {
            cursor: not-allowed;
        }

        .fielder-marker.selected {
            background-color: #4CAF50 !important;
            border-color: #FFFF00;
            box-shadow: 0 0 10px #4CAF50;
            z-index: 15;
        }

        /* --- UI CONTROLS --- */
        .config-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            background: #1a1a1a;
            padding: 12px;
            border-radius: 6px;
            width: 100%;
            margin-bottom: 15px;
            align-items: center;
        }

        .shot-controls {
            width: 100%;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 6px;
        }

        .input-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.8;
        }

        .btn-shot {
            background: #ff4444;
            color: white;
        }

        .btn-green {
            background: #4CAF50;
            color: white;
        }

        .btn-blue {
            background: #2196F3;
            color: white;
        }

        .btn-grey {
            background: #555;
            color: white;
        }

        .radio-group label {
            margin-right: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        input[type="radio"],
        input[type="checkbox"] {
            margin-right: 5px;
            cursor: pointer;
        }

        input[type="number"],
        input[type="text"] {
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #333;
            color: white;
            text-align: center;
        }

        /* --- SAVED SHOTS UI (LEFT COLUMN) --- */
        .match-context {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid #FF9800;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .match-context-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .saved-shots-panel {
            flex-grow: 1;
            /* Automatically fills available vertical space */
            background: #1a1a1a;
            padding: 10px;
            border-radius: 6px;
            overflow-y: auto;
            border: 1px solid #444;
            margin-bottom: 15px;
        }

        .saved-shot-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 10px;
            background: #333;
            border-radius: 4px;
            border-left: 4px solid #ff4444;
        }

        .saved-shot-item label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9em;
            flex-grow: 1;
        }

        /* --- SHORTCUTS UI --- */
.shortcuts-panel {
    background: #1a1a1a;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #444;
    margin-top: 15px;
}
kbd {
    background-color: #333;
    border: 1px solid #555;
    border-radius: 4px;
    box-shadow: 0 2px 0 rgba(0,0,0,0.5);
    color: #eee;
    font-family: monospace;
    font-size: 0.85em;
    padding: 2px 6px;
    font-weight: bold;
}

        /* Responsive stack for portrait tablets and phones */
        @media (max-width: 950px) {
            .main-layout {
                flex-direction: column;
            }

            .left-column {
                min-height: 400px;
            }
        }
    </style>
</head>

<body>

    <h1>Tactical Broadcast Control</h1>

    <div class="main-layout">

        <!-- ================= LEFT COLUMN: PLAYLIST ================= -->
        <div class="left-column">

            <div class="match-context">
                <div class="match-context-row">
                    <label style="font-weight: bold; font-size: 0.9em; color: #aaa;">Match ID:</label>
                    <input type="text" id="match-id" value="INDvAUS_T20" style="width: 60%;"
                        onchange="fetchShotsForMatch()">
                </div>
                <div class="match-context-row">

            </div>

            <h4 style="margin: 0 0 10px 0; color: #FF9800;">Saved Trajectories</h4>

            <div id="saved-shots-list" class="saved-shots-panel">
                <p style="color: #888; text-align: center; margin: 10px 0;">No saved shots yet.</p>
            </div>

            <button class="btn-shot" style="width: 100%; padding: 15px; font-size: 1.1em;"

            <div style="margin-top: 15px; font-size: 0.9em; color: #aaa; text-align: center;">
                Status: <span id="status-log" style="color:white; font-weight:bold;">Ready</span>
            </div>
            <div class="shortcuts-panel">
            <h5 style="margin: 0 0 10px 0; color: #4CAF50; text-transform: uppercase; font-size: 0.8em; text-align: center;">Keyboard Shortcuts</h5>
            <div style="display: flex; flex-direction: column; gap: 8px; font-size: 0.85em; color: #aaa;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <kbd>F2</kbd> <span>Resolution: HD</span>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">

                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">

                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <kbd>Spacebar</kbd> <span>Toggle Day/Night</span>
                </div>
            </div>
        </div>
        </div>

        <!-- ================= RIGHT COLUMN: INTERACTIVE & CONTROLS ================= -->
        <div class="right-column">

            <!-- 1. TOP SECTION: SETUP & BOUNDARIES -->
            <div style="width: 100%; margin-bottom: 20px;">
                <div class="config-bar"
                    style="background: #1e1e1e; padding: 10px; margin-bottom: 10px; flex-direction: column; gap: 10px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                        <label
                            style="cursor: pointer; font-weight: bold; color: #FFEB3B; font-size: 1em; display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="catchToggle" style="transform: scale(1.3);"> Catch Mode (OUT)
                        </label>
                        <button class="btn-grey" style="padding: 5px 10px; font-size: 0.8em;"
                            onclick="sendGroundDimensions()">Apply Boundaries</button>
                    </div>

                    <!-- Boundaries 4x2 Grid -->
                    <div
                        style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; justify-items: center; width: 100%;">
                        <div style="display: flex; gap: 4px; align-items: center;">
                            <label style="color: #4CAF50; font-size: 0.7em; font-weight: bold;">N</label>
                            <input type="number" id="dim-n" placeholder="N" style="width: 45px; padding: 4px;">
                        </div>
                        <div style="display: flex; gap: 4px; align-items: center;">
                            <label style="color: #4CAF50; font-size: 0.7em; font-weight: bold;">S</label>
                            <input type="number" id="dim-s" placeholder="S" style="width: 45px; padding: 4px;">
                        </div>
                        <div style="display: flex; gap: 4px; align-items: center;">
                            <label style="color: #4CAF50; font-size: 0.7em; font-weight: bold;">E</label>
                            <input type="number" id="dim-e" placeholder="E" style="width: 45px; padding: 4px;">
                        </div>
                        <div style="display: flex; gap: 4px; align-items: center;">
                            <label style="color: #4CAF50; font-size: 0.7em; font-weight: bold;">W</label>
                            <input type="number" id="dim-w" placeholder="W" style="width: 45px; padding: 4px;">
                        </div>
                        <div style="display: flex; gap: 4px; align-items: center;">
                            <label style="color: #FF9800; font-size: 0.7em; font-weight: bold;">NE</label>
                            <input type="number" id="dim-ne" placeholder="Avg" style="width: 45px; padding: 4px;">
                        </div>
                        <div style="display: flex; gap: 4px; align-items: center;">
                            <label style="color: #FF9800; font-size: 0.7em; font-weight: bold;">NW</label>
                            <input type="number" id="dim-nw" placeholder="Avg" style="width: 45px; padding: 4px;">
                        </div>
                        <div style="display: flex; gap: 4px; align-items: center;">
                            <label style="color: #FF9800; font-size: 0.7em; font-weight: bold;">SE</label>
                            <input type="number" id="dim-se" placeholder="Avg" style="width: 45px; padding: 4px;">
                        </div>
                        <div style="display: flex; gap: 4px; align-items: center;">
                            <label style="color: #FF9800; font-size: 0.7em; font-weight: bold;">SW</label>
                            <input type="number" id="dim-sw" placeholder="Avg" style="width: 45px; padding: 4px;">
                        </div>
                    </div>
                </div>
            </div>

            <!-- The Radar Map (Centered) -->
            <div class="interactive-zone" id="zone">
                <!-- The background image now handles the stadium visuals -->
                <div id="shot-marker"></div>
            </div>

            <!-- 2. BOTTOM SECTION: BATSMAN, SIDES & FIRING -->
            <div class="shot-controls" style="border-top: 2px solid #555; padding-top: 15px;">

                <!-- Action Row: Handedness, Side Swapping, Info Bar & Reset -->
                <div class="config-bar" style="background: #1a1a1a; margin-bottom: 15px;">
                    <div class="radio-group">
                        <label><input type="radio" name="batsman_hand" value="RHB" checked
                                onchange="onHandednessChange()"> RHB</label>
                        <label><input type="radio" name="batsman_hand" value="LHB" onchange="onHandednessChange()">
                            LHB</label>
                    </div>

                    <button class="btn-grey" style="margin-left: 10px; background-color: #607D8B;"
                        onclick="triggerChangeSide()">Swap Side</button>

                    <!-- NEW: Info Bar Toggle -->
                    <label
                        style="cursor: pointer; font-weight: bold; color: #fff; margin-left: 15px; display: flex; align-items: center; gap: 8px; font-size: 0.9em;">
                        <input type="checkbox" id="infoBarToggle" style="transform: scale(1.2);"
                            onchange="toggleInfoBar()"> Show Info Bar
                    </label>

                    <button class="btn-grey" style="margin-left: auto;" onclick="resetFielders()">Reset</button>
                </div>

                <div class="input-row">
                    <input type="text" id="ballNum" placeholder="Ball"
                        style="width: 80px; border: 2px solid #2196F3; font-weight: bold;">
                    <input type="number" id="height" placeholder="Hgt(m)" style="width: 70px;">
                    <input type="text" id="displayText" placeholder="Text..." style="flex-grow: 1;">
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <p style="margin: 0; font-size: 1.1em;">Aim: <span id="dist-display"
                            style="font-weight:bold; color: #2196F3;">0%</span> @ <span id="angle-display"
                            style="font-weight:bold; color: #2196F3;">0°</span></p>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-green" onclick="saveCurrentSix()">Save Shot</button>
                        <button class="btn-shot" onclick="triggerSixTrajectory()">Fire Single</button>
                    </div>
                </div>

                <!-- Camera Toggles
                <div style="display: flex; justify-content: center; gap: 10px; margin-top: 15px; border-top: 1px solid #444; padding-top: 15px;">
                    <button class="btn-blue" onclick="send_command('hyperview', '')">HyperView</button>
                    <button class="btn-blue" onclick="send_command('helmet_view', '')">Helmet View</button>
                </div> -->
            </div>

        </div>
    </div>

    <script>
        const socket = io();

        // --- DOM REFERENCES ---
        //const zone = document.getElementById('zone');
        const rope = document.getElementById('rope');
        const shotMarker = document.getElementById('shot-marker');
        const statusLog = document.getElementById('status-log');

        // --- STATE CONTROL ---
        let fielders = [];
        let fielderIdCounter = 0;
        let currentShot = { angle: 0, distance: 0, active: false };
        let currentActivePreset = null;

        // --- CORRECTED BASELINE PRESETS (180 = Bowler / South, 0 = Keeper / North) ---
        // All coordinates mapped relative to standard Right-Handed Batsman (RHB) stance view perspective
        const fieldingPresets = {
            powerplay_pace: [
                { id: 0, angle: 180, distance: 0.12 }, // Bowler Locked (South Line)
                { id: 1, angle: 0, distance: 0.22 }, // Keeper Locked (North Line)
                { id: 2, angle: 70, distance: 0.3 },  // Cover
                { id: 3, angle: 110, distance: 0.3 },  // Point
                { id: 4, angle: 40, distance: 0.15 }, // Slip 1
                { id: 5, angle: 25, distance: 0.18 }, // Slip 2
                { id: 6, angle: 310, distance: 0.3 },  // Square Leg
                { id: 7, angle: 250, distance: 0.35 }, // Mid Wicket
                { id: 8, angle: 200, distance: 0.4 },  // Mid On
                { id: 9, angle: 55, distance: 0.9 },  // Deep Third
                { id: 10, angle: 290, distance: 0.9 }  // Deep Fine Leg
            ],
            powerplay_spin: [
                { id: 0, angle: 180, distance: 0.12 }, // Bowler Locked
                { id: 1, angle: 0, distance: 0.20 }, // Keeper Locked (Closer)
                { id: 2, angle: 80, distance: 0.25 }, // Extra Cover
                { id: 3, angle: 105, distance: 0.35 }, // Point
                { id: 4, angle: 45, distance: 0.2 },  // Slip
                { id: 5, angle: 240, distance: 0.3 },  // Short Mid-Wicket
                { id: 6, angle: 300, distance: 0.25 }, // Backward Square Leg
                { id: 7, angle: 135, distance: 0.3 },  // Silly Point
                { id: 8, angle: 190, distance: 0.35 }, // Mid On
                { id: 9, angle: 50, distance: 0.9 },  // Deep Third
                { id: 10, angle: 270, distance: 0.9 }  // Deep Mid-Wicket
            ],
            standard_pace: [
                { id: 0, angle: 180, distance: 0.12 }, // Bowler Locked
                { id: 1, angle: 0, distance: 0.22 }, // Keeper Locked
                { id: 2, angle: 100, distance: 0.35 }, // Cover
                { id: 3, angle: 45, distance: 0.2 },  // Slip
                { id: 4, angle: 290, distance: 0.4 },  // Square Leg
                { id: 5, angle: 70, distance: 0.9 },  // Deep Point
                { id: 6, angle: 120, distance: 0.9 },  // Deep Backward Point
                { id: 7, angle: 160, distance: 0.9 },  // Long On
                { id: 8, angle: 200, distance: 0.9 },  // Long Off
                { id: 9, angle: 250, distance: 0.9 },  // Deep Mid Wicket
                { id: 10, angle: 310, distance: 0.4 }  // Short Fine Leg
            ],
            standard_spin: [
                { id: 0, angle: 180, distance: 0.12 }, // Bowler Locked
                { id: 1, angle: 0, distance: 0.20 }, // Keeper Locked
                { id: 2, angle: 80, distance: 0.3 },  // Cover
                { id: 3, angle: 105, distance: 0.35 }, // Point
                { id: 4, angle: 250, distance: 0.35 }, // Mid Wicket
                { id: 5, angle: 40, distance: 0.2 },  // Slip
                { id: 6, angle: 160, distance: 0.9 },  // Long On
                { id: 7, angle: 200, distance: 0.9 },  // Long Off
                { id: 8, angle: 60, distance: 0.9 },  // Deep Cover
                { id: 9, angle: 260, distance: 0.9 },  // Deep Mid-Wicket
                { id: 10, angle: 310, distance: 0.9 }  // Deep Square Leg
            ]
        };

        function send_command(action, payload) {
            socket.emit('send_command', { action: action, data: payload });
        }

        // --- INITIALIZATION ---
        function initFielders() {
            const centerX = 250, centerY = 250;

            // Default flipped starting points: Bowler at bottom (180), Keeper at top (0)
            const initialSetup = [
                { angle: 180, dist: 20 }, // 0: Bowler
                { angle: 0, dist: 35 },   // 1: Wicketkeeper
                { angle: 40, dist: 100 }, { angle: 80, dist: 100 }, { angle: 120, dist: 100 },
                { angle: 150, dist: 70 }, { angle: 210, dist: 70 }, { angle: 240, dist: 100 },
                { angle: 280, dist: 100 }, { angle: 320, dist: 100 }, { angle: 350, dist: 80 }
            ];

            for (let i = 0; i < 11; i++) {
                const setup = initialSetup[i];
                const angleRad = (setup.angle - 90) * (Math.PI / 180);
                const x = centerX + Math.cos(angleRad) * setup.dist;
                const y = centerY + Math.sin(angleRad) * setup.dist;
                createFielder(x, y);
            }
        }

        function createFielder(x, y) {
            const id = fielderIdCounter++;
            const el = document.createElement('div');
            el.className = 'fielder-marker';

            if (id === 0) {
                el.innerText = 'B';
                el.style.backgroundColor = '#9C27B0'; // Purple Bowler
                el.classList.add('role-locked');
            } else if (id === 1) {
                el.innerText = 'WK';
                el.style.backgroundColor = '#E91E63'; // Pink Keeper
                el.classList.add('role-locked');
            } else {
                el.innerText = id;
            }

            el.style.left = x + 'px';
            el.style.top = y + 'px';

            zone.appendChild(el);
            const fielderObj = { id: id, x: x, y: y, selected: false, element: el };
            fielders.push(fielderObj);

            addFielderInteractions(el, fielderObj);
            el.addEventListener('click', (e) => e.stopPropagation());

            return fielderObj;
        }

        function addFielderInteractions(el, obj) {
            if (obj.id === 0 || obj.id === 1) return; // Keeper and Bowler remain locked

            let isDragging = false;

            // Unified handler function for moving (Mouse & Touch)
            function handleMove(clientX, clientY) {
                isDragging = true;
                const rect = zone.getBoundingClientRect();

                let newX = clientX - rect.left;
                let newY = clientY - rect.top;

                // Clamp positions to the 500x500 container boundaries
                newX = Math.max(0, Math.min(newX, 500));
                newY = Math.max(0, Math.min(newY, 500));

                el.style.left = newX + 'px';
                el.style.top = newY + 'px';

                obj.x = newX;
                obj.y = newY;
            }

            // --- DESKTOP MOUSE EVENTS ---
            el.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                isDragging = false;

                const onMouseMove = (moveEvent) => {
                    handleMove(moveEvent.clientX, moveEvent.clientY);
                };

                const onMouseUp = () => {
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('mouseup', onMouseUp);

                    if (isDragging) {
                        sendFielderPosition(obj);
                    } else {
                        toggleFielderSelection(obj);
                    }
                };

                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseup', onMouseUp);
            });

            // --- MOBILE & IPAD TOUCH EVENTS ---
            el.addEventListener('touchstart', (e) => {
                // Stop browser from scrolling or zooming while dragging a fielder
                if (e.cancelable) e.preventDefault();
                e.stopPropagation();
                isDragging = false;

                const onTouchMove = (moveEvent) => {
                    // grab the coordinates of the first finger touching the screen
                    const touch = moveEvent.touches[0];
                    handleMove(touch.clientX, touch.clientY);
                };

                const onTouchEnd = () => {
                    window.removeEventListener('touchmove', onTouchMove);
                    window.removeEventListener('touchend', onTouchEnd);

                    if (isDragging) {
                        sendFielderPosition(obj);
                    } else {
                        toggleFielderSelection(obj);
                    }
                };

                window.addEventListener('touchmove', onTouchMove, { passive: false });
                window.addEventListener('touchend', onTouchEnd);
            }, { passive: false });
        }

        function toggleFielderSelection(obj) {
            if (obj.id === 0 || obj.id === 1) return;

            obj.selected = !obj.selected;
            if (obj.selected) obj.element.classList.add('selected');
            else obj.element.classList.remove('selected');

            const action = obj.selected ? "fielder_select" : "fielder_deselect";
            socket.emit('send_command', { action: action, fielderIndex: obj.id });
        }

        function sendFielderPosition(obj) {
            const polar = getPolarData(obj.x, obj.y);
            socket.emit('send_command', {
                action: "fielder_move",
                data: { index: obj.id, angle: polar.angle, distance: polar.distance }
            });
            statusLog.innerText = `Moved Fielder ${obj.id}`;
        }

        // --- PRESET APPLICATION SYSTEM WITH DYNAMIC HANDEDNESS INVERSION ---
        function applyLayout(presetKey) {
            if (presetKey) currentActivePreset = presetKey;
            if (!currentActivePreset) return;

            const layout = fieldingPresets[currentActivePreset];
            if (!layout) return;

            const centerX = 250;
            const centerY = 250;
            const ropeRadius = 175;

            // Check checked state of DOM radio configurations
            const selectedHand = document.querySelector('input[name="batsman_hand"]:checked').value;

            layout.forEach(presetItem => {
                const fielderObj = fielders.find(f => f.id === presetItem.id);

                if (fielderObj) {
                    let targetAngle = presetItem.itemAngle || presetItem.angle;

                    // Apply horizontal inversion mirror processing if batsman is LHB
                    if (selectedHand === "LHB") {
                        // Mirror angle along vertical axis (360 - angle)
                        // Keeps Bowler (180) and Keeper (0/360) exactly centered
                        targetAngle = (360 - targetAngle) % 360;
                    }

                    // Convert processing coordinates safely back to Canvas grid spacing
                    let angleRad = (targetAngle - 90) * (Math.PI / 180);
                    let pixelDist = presetItem.distance * ropeRadius;

                    let targetX = centerX + Math.cos(angleRad) * pixelDist;
                    let targetY = centerY + Math.sin(angleRad) * pixelDist;

                    targetX = Math.max(0, Math.min(targetX, 500));
                    targetY = Math.max(0, Math.min(targetY, 500));

                    fielderObj.x = targetX;
                    fielderObj.y = targetY;
                    fielderObj.element.style.left = targetX + 'px';
                    fielderObj.element.style.top = targetY + 'px';
                }
            });

            bindIndices();
            statusLog.innerText = `Layout Applied: ${currentActivePreset.replace('_', ' ').toUpperCase()} (${selectedHand})`;
        }

        // Trigger dynamic layout rebuild immediately if user modifies stance mid-game
        function onHandednessChange() {
            const selectedHand = document.querySelector('input[name="batsman_hand"]:checked').value;

            // 2. Convert to integer: 0 for Right, 1 for Left
            const handIntValue = (selectedHand === "RHB") ? 0 : 1;

            // 3. Emit the integer command to your Python/Unity backend
            send_command('set_handedness', handIntValue);

            // 4. Update the UI
            if (currentActivePreset) {
                applyLayout();
            } else {
                statusLog.innerText = `Handedness set to ${selectedHand}. Select a layout template to render.`;
            }
        }

        // --- MAP CLICK / AIM LOGIC ---
        // --- NEW LOGIC: CARTESIAN IMAGE MAPPING ---
const zone = document.getElementById("zone");
const marker = document.getElementById("shot-marker");

zone.addEventListener("click", function(event) {
    if (event.target.classList.contains("fielder-marker")) return;
    
    const rect = zone.getBoundingClientRect();
    
    // 1. Raw Pixel Click relative to the top-left of the image
    const clickX = event.clientX - rect.left;
    const clickY = event.clientY - rect.top;

    // 2. Convert to Cartesian Coordinates (Center of image is 0,0)
    // We invert Y so that Top (North) is positive, Bottom (South) is negative
    const cartesianX = clickX - (rect.width / 2);
    const cartesianY = (rect.height / 2) - clickY;

    // 3. Normalize coordinates from -1.0 to 1.0 based on image bounds
    const normX = cartesianX / (rect.width / 2);
    const normY = cartesianY / (rect.height / 2);

    // 4. Derive pure mathematical Angle from the X/Y vectors
    // Math.atan2 gives standard angle; we convert it to a Cricket Compass (0°=North, 90°=East)
    let rawAngle = Math.atan2(cartesianY, cartesianX) * (180 / Math.PI);
    let compassAngle = 90 - rawAngle;
    if (compassAngle < 0) compassAngle += 360;

    // 5. Distance is the magnitude of the normalized vector
    // 1.0 (100%) = exactly touching the flat edge of the image.
    // > 1.0 = clicking into the corners of the square image.
    const magnitude = Math.sqrt(normX * normX + normY * normY);

    // Store for Unity payload
    currentShot = { active: true, angle: compassAngle, distance: magnitude };
    
    // Visual Marker Update
    marker.style.left = `${clickX}px`;
    marker.style.top = `${clickY}px`;
    marker.style.display = 'block';

    // Update UI Text
    document.getElementById("dist-display").innerText = `${(magnitude * 100).toFixed(0)}%`;
    document.getElementById("angle-display").innerText = `${compassAngle.toFixed(0)}°`;
});

        function triggerSixTrajectory() {
            if (!currentShot.active) {
                alert("Click the ground to aim first.");
                return;
            }

            const bInput = document.getElementById("ballNum") ? document.getElementById("ballNum").value : "0.0";
            const hInput = document.getElementById("height").value;
            const tInput = document.getElementById("displayText").value;

            // Check if Catch Mode is enabled
            const isCatchMode = document.getElementById("catchToggle").checked;
            const actionType = isCatchMode ? "catch" : "hit_six";

            const payload = {
                action: actionType, // Dynamically set to "hit_six" or "catch"
                data: [{
                    resultId: 1,
                    height: Number(hInput) ? Number(hInput) : 0,
                    pos_x: currentShot.angle,
                    pos_y: currentShot.distance,
                    bowler_name: "Denis Lilie",
                    batsman_name: "Don Bradman",
                    total_runs: isCatchMode ? 0 : 6, // Optional: Force runs to 0 if it's a catch!
                    over_number: parseFloat(bInput) || 0,
                    ball_number: parseFloat(bInput) || 0
                }],
                text: tInput
            };

            socket.emit('send_command', payload);
            console.log(`Shot Fired (${actionType}):`, payload);
        }

        // --- HELPER: MATH ---
        function getPolarData(x, y) {
            const centerX = 250;
            const centerY = 250;
            const dx = x - centerX;
            const dy = y - centerY;

            let angleRad = Math.atan2(dy, dx);
            let angleDeg = angleRad * (180 / Math.PI) + 90;
            if (angleDeg < 0) angleDeg += 360;

            const pixelDist = Math.sqrt(dx * dx + dy * dy);
            const ropeRadius = 175;
            const normalizedDist = pixelDist / ropeRadius;

            return { angle: angleDeg, distance: normalizedDist };
        }

        function bindIndices() {
            let allFieldersData = [];
            fielders.forEach(f => {
                let polar = getPolarData(f.x, f.y);
                allFieldersData.push({
                    fielderIndex: f.id,
                    angle: polar.angle,
                    distance: polar.distance
                });
            });

            const payload = { action: "bind_fielders", data: allFieldersData };
            socket.emit('send_command', payload);
            statusLog.innerText = `Bound ${allFieldersData.length} fielders to Unity!`;
        }

        function resetFielders() {
            let deselectedCount = 0;
            fielders.forEach(f => {
                if (f.selected) {
                    f.selected = false;
                    f.element.classList.remove('selected');
                    deselectedCount++;
                }
            });
            send_command("reset", "");
        }
        // --- NEW ENVIRONMENT CONTROLS ---

        let innerCircleVisible = true;

        function toggleInnerCircle() {
            innerCircleVisible = !innerCircleVisible;

            // Update Button UI
            const btn = document.getElementById('btn-inner-circle');
            btn.innerText = innerCircleVisible ? "Hide 30-Yard Ring" : "Show 30-Yard Ring";

            // Send 1 (visible) or 0 (hidden) to Unity
            send_command("toggle_inner_circle", innerCircleVisible ? 1 : 0);
            statusLog.innerText = `30-Yard Ring ${innerCircleVisible ? 'Visible' : 'Hidden'}`;
        }

        function updateIdleMovement(val) {
            // Update the text number next to the slider
            document.getElementById('idle-val').innerText = parseFloat(val).toFixed(2);

            // Send the float value directly to Unity
            send_command("set_idle_movement", parseFloat(val));
        }
        socket.on('update_fielders', function (response) {
            const fieldersData = response.fielders;
            const mapWidth = zone.clientWidth;
            const mapHeight = zone.clientHeight;
            fieldersData.forEach(incomingData => {
                const fielderObject = fielders[incomingData.id];
                if (fielderObject) {
                    const fielderElement = fielderObject.element;
                    const pixelX = incomingData.x * mapWidth;
                    const pixelY = incomingData.y * mapHeight;
                    if (fielderElement) {
                        fielderElement.style.left = pixelX + 'px';
                        fielderElement.style.top = pixelY + 'px';
                        fielderObject.x = pixelX;
                        fielderObject.y = pixelY;
                    }
                }
            });
        });

        initFielders();

        function drawAerialGap() {
            let selectedFielders = fielders.filter(f => f.selected);

            // Check for at least 2
            if (selectedFielders.length < 2) {
                alert("Please select at least 2 fielders to visualize an aerial corridor.");
                return;
            }

            // Sort the fielders visually from Left to Right (based on X coordinate).
            // This ensures a clean, continuous defensive wall without lines crossing over each other!
            selectedFielders.sort((a, b) => a.x - b.x);

            const fielderIds = selectedFielders.map(f => f.id);
            // Send command to Unity
            send_command('aerial_gap', fielderIds);
            statusLog.innerText = `Displaying aerial wall between ${fielderIds.length} fielders`;
        }
        // --- DATABASE-BACKED SAVED SHOTS LOGIC ---
        let savedSixes = [];

        // Helper to get current match context from UI
        function getMatchContext() {
            return {
                match_id: document.getElementById('match-id').value,
                innings_number: parseInt(document.getElementById('innings-num').value)
            };
        }

        // --- UPDATED: Restore inputs from Local Storage on load ---
        window.onload = () => {
            // 1. Restore Match Context
            const savedMatch = localStorage.getItem('broadcast_match_id');
            const savedInnings = localStorage.getItem('broadcast_innings_num');
            if (savedMatch) document.getElementById('match-id').value = savedMatch;
            if (savedInnings) document.getElementById('innings-num').value = savedInnings;

            // 2. Restore Ground Dimensions (Cardinals)
            const dimN = localStorage.getItem('ground_dim_n');
            const dimS = localStorage.getItem('ground_dim_s');
            const dimE = localStorage.getItem('ground_dim_e');
            const dimW = localStorage.getItem('ground_dim_w');
            if (dimN) document.getElementById('dim-n').value = dimN;
            if (dimS) document.getElementById('dim-s').value = dimS;
            if (dimE) document.getElementById('dim-e').value = dimE;
            if (dimW) document.getElementById('dim-w').value = dimW;

            // 3. Restore Ground Dimensions (Diagonals)
            const dimNE = localStorage.getItem('ground_dim_ne');
            const dimNW = localStorage.getItem('ground_dim_nw');
            const dimSE = localStorage.getItem('ground_dim_se');
            const dimSW = localStorage.getItem('ground_dim_sw');
            if (dimNE) document.getElementById('dim-ne').value = dimNE;
            if (dimNW) document.getElementById('dim-nw').value = dimNW;
            if (dimSE) document.getElementById('dim-se').value = dimSE;
            if (dimSW) document.getElementById('dim-sw').value = dimSW;

            // 4. Fetch the shots
            fetchShotsForMatch();
        };

        function fetchShotsForMatch() {
            const context = getMatchContext();

            // Save the current context to the browser's memory
            localStorage.setItem('broadcast_match_id', context.match_id);
            localStorage.setItem('broadcast_innings_num', context.innings_number);

            statusLog.innerText = `Loading shots for ${context.match_id} (Inn ${context.innings_number})...`;
            savedSixes = []; // Clear current UI list
            renderSavedSixes();

            // Ask the Flask backend for the data
            socket.emit('request_shots', context);
        }

        // 2. Listen for the database syncing back to the UI
        socket.on('update_saved_shots', function (dbShots) {
            // Preserve the checked/selected state of any currently loaded shots
            const oldSelections = new Set(savedSixes.filter(s => s.selected).map(s => s.id));

            savedSixes = dbShots.map(shot => ({
                ...shot,
                selected: oldSelections.has(shot.id) // Re-apply checkbox state if it existed
            }));

            renderSavedSixes();
        });

        // 3. Send new shot to the Python backend to be saved in SQLite
        function saveCurrentSix() {
            if (!currentShot.active) {
                alert("Click the ground to aim first.");
                return;
            }

            const context = getMatchContext();
            const bInput = document.getElementById("ballNum").value;
            const hInput = document.getElementById("height").value;
            const tInput = document.getElementById("displayText").value;

            if (!bInput) {
                alert("Please enter a Ball Number (e.g., 14.2) before saving.");
                return;
            }

            const payload = {
                match_id: context.match_id,
                innings_number: context.innings_number,
                ball_number: bInput, // NEW
                angle: currentShot.angle,
                distance: currentShot.distance,
                height: Number(hInput) ? Number(hInput) : 0,
                text: tInput
            };

            socket.emit('save_shot', payload);
        }

        // 4. Render the UI
        function renderSavedSixes() {
            const container = document.getElementById("saved-shots-list");

            if (savedSixes.length === 0) {
                container.innerHTML = '<p style="color: #888; text-align: center; margin: 10px 0;">No saved shots yet for this innings.</p>';
                return;
            }

            container.innerHTML = '';

            savedSixes.forEach(shot => {
                const div = document.createElement("div");
                div.className = "saved-shot-item";

                const label = document.createElement("label");
                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.checked = shot.selected;
                checkbox.onchange = (e) => { shot.selected = e.target.checked; };

                const textSpan = document.createElement("span");
                // NEW: Formatted to highly emphasize the Ball Number
                textSpan.innerHTML = `<strong style="color:#2196F3;">Ball ${shot.ball_number}</strong> | ${(shot.distance * 100).toFixed(0)}% @ ${shot.angle.toFixed(0)}°`;

                label.appendChild(checkbox);
                label.appendChild(textSpan);

                const delBtn = document.createElement("button");
                delBtn.innerText = "✖";
                delBtn.style.padding = "4px 8px";
                delBtn.style.background = "transparent";
                delBtn.style.border = "1px solid #888";
                delBtn.style.color = "#fff";
                delBtn.style.borderRadius = "4px";
                delBtn.onmouseover = () => delBtn.style.background = "#d32f2f";
                delBtn.onmouseout = () => delBtn.style.background = "transparent";

                delBtn.onclick = () => {
                    const context = getMatchContext();
                    socket.emit('delete_shot', {
                        shot_id: shot.id,
                        match_id: context.match_id,
                        innings_number: context.innings_number
                    });
                };

                div.appendChild(label);
                div.appendChild(delBtn);
                container.appendChild(div);
            });
        }

        // 6. Fire the selected shots (Unchanged from before)
        function fireSelectedSixes() {
            const activeShots = savedSixes.filter(s => s.selected);

            if (activeShots.length === 0) {
                alert("Select at least one saved shot from the list to fire.");
                return;
            }

            // Check if Catch Mode is enabled
            const isCatchMode = document.getElementById("catchToggle").checked;
            const actionType = isCatchMode ? "catch" : "resix";

            const payloadData = activeShots.map((shot, index) => {
                return {
                    resultId: index + 1,
                    height: shot.height,
                    pos_x: shot.angle,
                    pos_y: shot.distance,
                    bowler_name: "Denis Lilie",
                    batsman_name: "Don Bradman",
                    total_runs: isCatchMode ? 0 : 6, // Force runs to 0 if caught
                    over_number: parseFloat(shot.ball_number) || 0,
                    ball_number: parseFloat(shot.ball_number) || 0
                };
            });

            const combinedText = activeShots.map(s => s.text).filter(t => t !== "").join(" | ");

            const payload = {
                action: actionType, // Dynamically set to "hit_six" or "catch"
                data: payloadData,
                text: combinedText
            };

            socket.emit('send_command', payload);
            console.log(`Fired Batch Shots (${actionType}):`, payload);
            statusLog.innerText = `Fired ${activeShots.length} trajectories simultaneously as ${actionType.toUpperCase()}!`;
        }

        // --- NEW: CHANGE BOWLING SIDE ---
        function triggerChangeSide() {
            // Emits the command to the Flask server, which forwards it to Unity
            // Sending an empty string or '0' as the payload since it acts as a simple trigger
            send_command('change_side', '');

            // Update the UI log
            statusLog.innerText = `Command Sent: Swapped Bowling Side/End`;
        }

        // --- NEW: GROUND DIMENSIONS LOGIC ---
        function sendGroundDimensions() {
            // 1. Grab Cardinal values
            const n = parseFloat(document.getElementById('dim-n').value) || 75;
            const s = parseFloat(document.getElementById('dim-s').value) || 65;
            const e = parseFloat(document.getElementById('dim-e').value) || 70;
            const w = parseFloat(document.getElementById('dim-w').value) || 70;

            // 2. Grab Diagonal values (default to 0 if left blank)
            let ne = parseFloat(document.getElementById('dim-ne').value) || 0;
            let nw = parseFloat(document.getElementById('dim-nw').value) || 0;
            let se = parseFloat(document.getElementById('dim-se').value) || 0;
            let sw = parseFloat(document.getElementById('dim-sw').value) || 0;

            // 3. Averaging Logic (If diagonal is 0, average the adjacent cardinals)
            if (ne === 0) ne = (n + e) / 2;
            if (nw === 0) nw = (n + w) / 2;
            if (se === 0) se = (s + e) / 2;
            if (sw === 0) sw = (s + w) / 2;

            // 4. Update the UI boxes so the operator sees the calculated averages
            document.getElementById('dim-ne').value = ne;
            document.getElementById('dim-nw').value = nw;
            document.getElementById('dim-se').value = se;
            document.getElementById('dim-sw').value = sw;

            // 5. Save all 8 values to browser memory
            localStorage.setItem('ground_dim_n', n);
            localStorage.setItem('ground_dim_s', s);
            localStorage.setItem('ground_dim_e', e);
            localStorage.setItem('ground_dim_w', w);
            localStorage.setItem('ground_dim_ne', ne);
            localStorage.setItem('ground_dim_nw', nw);
            localStorage.setItem('ground_dim_se', se);
            localStorage.setItem('ground_dim_sw', sw);

            // 6. Emit to Unity
            const payload = {
                north: n, south: s, east: e, west: w,
                northeast: ne, northwest: nw, southeast: se, southwest: sw
            };

            send_command('update_ground_dimensions', payload);
            statusLog.innerText = `8-Point Boundary Applied & Synced to Unity`;
        }

    const isVisible = document.getElementById("infoBarToggle").checked;
    
    // Convert boolean to integer (1 for show, 0 for hide) for easy parsing in Unity
    const visibilityValue = isVisible ? 1 : 0;
    
    send_command('toggle_info_bar', visibilityValue);
    
    statusLog.innerText = `Info Bar set to: ${isVisible ? 'VISIBLE' : 'HIDDEN'}`;
}
